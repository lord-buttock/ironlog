const IRON_EXERCISES={iron_heel_elev_squat:{name:'Heel-Elevated Squat',muscle:'Quads',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Heels raised on yoga block or weight plate. Sit deep into squat, knees track over toes. Upright torso throughout. Drive through quads on the way up.',demoId:'UvxTioyshwQ',demo:YT('heel+elevated+squat+dumbbell+tutorial+form')},iron_bulgarian_split:{name:'Bulgarian Split Squat',muscle:'Quads',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,perSide:true,cue:'Rear foot elevated on chair behind you. Lower rear knee toward floor, torso upright. Front foot flat, drive through heel. Keep most weight through the front leg.',caution:'Slipped disc — stop if lower back rounds or you feel any lumbar discomfort.',demoId:'o7yFuIR9XVU',demo:YT('bulgarian+split+squat+dumbbell+tutorial+form')},iron_kas_bridge:{name:'Kas Glute Bridge',muscle:'Glutes',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Like a glute bridge but with very small ROM — do not lock out at the top. Keep constant glute tension throughout. Slow, deliberate pace. Weight across hips.',demoId:'SN3Yy07jWPA',demo:YT('kas+glute+bridge+tutorial+constant+tension')},iron_sl_rdl:{name:'Single-Leg RDL',muscle:'Hamstrings',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,perSide:true,cue:'Hinge on one leg, rear leg floats back as counterweight. Neutral spine — no rounding. Light load, focus on the hip hinge and balance. Stop well before hamstring pull.',caution:'Slipped disc — neutral spine only. Stop if lower back tightens.',demoId:'MeV_WFmvBCU',demo:YT('single+leg+romanian+deadlift+dumbbell+form+tutorial')},iron_bw_kickback:{name:'Bodyweight Glute Kickback',muscle:'Glutes',unit:'bw',defaultSets:4,defaultDuration:60,defaultReps:12,perSide:true,cue:'On hands and knees. Drive heel toward ceiling, squeezing glute at top. Keep hips square — do not twist. Controlled return. Can add band around thighs.',demoId:'KEaLf6QraWU',demo:YT('bodyweight+glute+kickback+quadruped+tutorial')},iron_cyclist_squat:{name:'Cyclist Squat',muscle:'Quads',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Very narrow stance, heels elevated on block. Extreme quad isolation. Go deep — the elevated heels allow the knees to travel well forward. Dumbbells held at sides or in goblet position.',demoId:'QnsIwZZT0Q8',demo:YT('cyclist+squat+dumbbell+heel+elevated+quad+tutorial')},iron_fwd_lunge:{name:'Forward Alternating Lunge',muscle:'Quads',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Step forward, lower rear knee toward floor. Drive through front heel to return. Alternate legs. More quad-dominant than reverse lunge. Keep torso upright throughout.',demoId:'CpvfDjEulYQ',demo:YT('forward+alternating+lunge+dumbbell+form+tutorial')},iron_1_5_goblet:{name:'1.5 Rep Goblet Squat',muscle:'Quads',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Full squat down, rise halfway, lower back down fully, then stand completely = 1 rep. Constant time under tension. Slower tempo than standard goblet squat.',demoId:'3Q8i79Kd_EM',demo:YT('1.5+rep+goblet+squat+time+under+tension+tutorial')},iron_squat_pulse:{name:'Bodyweight Squat Pulse',muscle:'Quads',unit:'bw',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Stay at the bottom of a squat and pulse up and down through a very small range. Maintain tension throughout — do not stand up. Burn-out finisher for quads.',demoId:'Mdc-nP0APzo',demo:YT('squat+pulse+bodyweight+legs+burnout+tutorial')},iron_b_stance_rdl:{name:'B-Stance RDL',muscle:'Hamstrings',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,perSide:true,cue:'Staggered stance — front foot takes most of the load. Rear foot touches floor for balance only. Hinge at hip, neutral spine. Most of the work goes through the front leg.',caution:'Slipped disc — neutral spine only. Stop if lower back tightens.',demoId:'d8mnjJ00DjI',demo:YT('b+stance+rdl+dumbbell+single+leg+hinge+tutorial')},iron_sumo_dl:{name:'Sumo Deadlift',muscle:'Glutes',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Wide stance, toes pointed out 30-45°. Grip DBs between legs. Push knees out in line with toes as you drive up. Neutral spine throughout. Full hip extension at the top.',caution:'Slipped disc — neutral spine only. Stop immediately if lower back pain.',demoId:'De9OUZz5W_I',demo:YT('dumbbell+sumo+deadlift+form+tutorial+glutes')},iron_banded_abduct:{name:'Banded Glute Abduction',muscle:'Glutes',unit:'band',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Resistance band around thighs just above knees. Seated or lying with knees bent. Push knees apart against band resistance, controlling return. Targets glute medius.',demoId:'DU6W5rVb7zA',demo:YT('banded+glute+abduction+seated+lying+tutorial')},iron_db_row:{name:'Bent-Over DB Row',muscle:'Lats',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Hinge forward at hips, flat back. Both DBs hang below chest. Pull elbows back and up, squeezing shoulder blades. Control the descent. Core braced throughout.',demoId:'PFTMBwL3GV0',demo:YT('bent+over+dumbbell+row+both+arms+form+tutorial')},iron_pronated_row:{name:'Pronated (Palms Down) Row',muscle:'Lats',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Overhand grip (palms facing you as you hinge). Pull elbows back. Overhand grip increases upper back and rear delt engagement compared to underhand. Flat back throughout.',demoId:'vgE1djLy9vw',demo:YT('pronated+overhand+dumbbell+row+back+tutorial')},iron_supinated_row:{name:'Supinated (Palms Up) Row',muscle:'Lats',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Underhand grip (palms facing ceiling as you hinge). Pull elbows back close to body. Underhand grip increases bicep involvement compared to overhand. Flat back throughout.',demoId:'YsCSDAwAhag',demo:YT('supinated+underhand+dumbbell+row+bicep+back+tutorial')},iron_pullover:{name:'DB Pullover',muscle:'Lats',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Lie on bench, hold one DB with both hands above chest. Arc slowly behind head, keeping slight bend in elbows. Return to start. Light weight — this is a stretch movement.',caution:'Shoulder bursitis — use light weight only. Stop if you feel impingement at the stretched (overhead) position.',demoId:'jCV5t9Cy4hI',demo:YT('dumbbell+pullover+lat+stretch+tutorial+form')},iron_zottman:{name:'Zottman Curl',muscle:'Biceps',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Curl up with supinated (palms up) grip, rotate to pronated (palms down) at top, lower slowly with pronated grip. Trains biceps on the way up and forearms on the way down.',demoId:'CUyil5rSf4E',demo:YT('zottman+curl+dumbbell+tutorial+bicep+forearm')},iron_suitcase_squat:{name:'Suitcase Squat',muscle:'Quads',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Feet shoulder-width, DBs held at sides (not goblet position). Squat down keeping torso upright. Resist the urge to lean — maintain a vertical torso throughout.',demoId:'rQhACv66Xe0',demo:YT('suitcase+squat+dumbbell+sides+tutorial')},iron_curtsy_lunge:{name:'Curtsy Lunge',muscle:'Glutes',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,perSide:true,cue:'Step one foot behind and across the other (curtsy position). Lower rear knee toward floor. Front knee tracks over toes. Works glutes and abductors. Return to start.',demoId:'giX5abwg1lw',demo:YT('curtsy+lunge+dumbbell+glute+abductor+tutorial')},iron_seated_calf:{name:'Seated Calf Raise',muscle:'Calves',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Seated, weight plates or DBs resting on knees. Rise onto balls of feet, hold 1 second at top. Lower fully to feel the stretch at the bottom. Slow, controlled tempo.',demoId:'fFWpWJy8ybU',demo:YT('seated+calf+raise+dumbbell+knees+tutorial+form')},iron_incline_press:{name:'Incline DB Chest Press',muscle:'Chest',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Low incline only (20-30°). Elbows at 45° from body — not flared. Lower to chest, press up. Higher inclines approach overhead pressing angle — stay low.',caution:'Shoulder bursitis — low incline only (20-30°). Stop if you feel any shoulder impingement.',demoId:'ljyqdC4ydrM',demo:YT('incline+dumbbell+chest+press+low+incline+form+tutorial')},iron_bench_dip:{name:'Chair / Bench Dip',muscle:'Triceps',unit:'bw',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Hands on chair edge behind, fingers pointing forward. Lower by bending elbows. Keep elbows pointing straight back — do not flare. Stop range if shoulders feel uncomfortable.',demoId:'4ua3MzaU0QU',demo:YT('bench+dip+tricep+chair+tutorial+form')},iron_hip_hinge_hold:{name:'Hip Hinge Hold',muscle:'Hamstrings',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Hinge at hips with DBs held at thighs. Hold the hinge position isometrically — back flat, slight knee bend, hamstrings loaded. Replaces Good Mornings; eliminates loaded spinal flexion risk.',demoId:'hi6T9-znK84',demo:YT('hip+hinge+hold+isometric+hamstring+tutorial')},iron_bw_hyper_ext:{name:'Bodyweight Back Extension',muscle:'Glutes',unit:'bw',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Lie prone on mat. Lift chest and legs together (superman position), or just chest if lower back complains. No added load — bodyweight only. Stop if lower back is uncomfortable.',demoId:'cIYeKqLqVVs',demo:YT('bodyweight+back+extension+prone+superman+tutorial')},iron_lying_ham_curl:{name:'Lying DB Hamstring Curl',muscle:'Hamstrings',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Lie face down, feet together squeezing a single DB between them. Curl DB toward glutes, hold briefly, lower with control. Light weight — squeeze the hamstrings, no momentum.',demoId:'q1G8PRYBdU8',demo:YT('lying+dumbbell+hamstring+curl+feet+squeeze+tutorial')},iron_lateral_hold:{name:'Lateral Raise Hold',muscle:'Side Delts',unit:'kg',defaultSets:4,defaultDuration:60,defaultReps:12,cue:'Hold
